<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Shammo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 196, 87, 0.38), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(77, 208, 225, 0.34), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(244, 114, 182, 0.34), transparent 32%),
        linear-gradient(135deg, #111827 0%, #2f3a4e 52%, #182235 100%);
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(255, 255, 255, 0.55) 0 1px, transparent 2px);
      background-size: 72px 72px, 118px 118px;
      animation: drift 18s linear infinite;
      opacity: 0.62;
    }

    main {
      width: min(92vw, 860px);
      padding: clamp(2.5rem, 7vw, 6rem);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.56);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      position: relative;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(120deg, #ffd166, #06d6a0, #4cc9f0, #f72585);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1.2rem;
      padding: 0.48rem 0.82rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      color: #dbeafe;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow span {
      width: 0.58rem;
      height: 0.58rem;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 18px #34d399;
    }

    h1 {
      font-size: clamp(3.2rem, 12vw, 8.2rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: 0 16px 42px rgba(0, 0, 0, 0.44);
    }

    h1 strong {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #fff7ad, #7dd3fc, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 620px;
      margin: 1.6rem auto 0;
      color: #dbeafe;
      font-size: clamp(1rem, 2.4vw, 1.28rem);
      line-height: 1.7;
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: -35%;
      left: -70%;
      width: 45%;
      height: 170%;
      transform: rotate(18deg);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.24), transparent);
      animation: shimmer 5.5s ease-in-out infinite;
    }

    @keyframes drift {
      from {
        background-position: 0 0, 0 0;
      }
      to {
        background-position: 72px 144px, -118px 118px;
      }
    }

    @keyframes shimmer {
      0%, 42% {
        left: -70%;
      }
      76%, 100% {
        left: 125%;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles"></div>
  <main>
    <div class="shine"></div>
    <div class="eyebrow"><span></span>Warm Welcome</div>
    <h1>Hello <strong>Everyone</strong></h1>
    <p>A bright little greeting page with glassy depth, animated sparkle, and a soft color glow.</p>
  </main>
</body>
</html>
